  <circle cx="816" cy="244" r="22" fill="none" stroke="#5EEAD4" stroke-width="4"/>
  <rect x="770" y="287" width="92" height="18" rx="9" fill="#5EEAD4" opacity="0.88"/>
  <rect x="748" y="317" width="136" height="14" rx="7" fill="#64748B" opacity="0.55"/>

