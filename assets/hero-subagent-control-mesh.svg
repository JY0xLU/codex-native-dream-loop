  </text>

  <rect x="294" y="274" width="210" height="42" rx="21" fill="#132034" stroke="#1E3A5F"/>
  <text x="319" y="301" fill="#BFDBFE" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">
