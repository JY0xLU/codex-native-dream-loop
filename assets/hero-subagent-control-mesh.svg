  </text>

  <line x1="842" y1="320" x2="1008" y2="204" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
  <line x1="842" y1="320" x2="1098" y2="320" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
  <line x1="842" y1="320" x2="1008" y2="436" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
  <line x1="842" y1="320" x2="876" y2="510" stroke="url(#accent)" stroke-width="3" opacity="0.55"/>

  <rect x="742" y="242" width="200" height="156" rx="28" fill="url(#card)" stroke="#2DD4BF" stroke-width="2"/>
  <circle cx="842" cy="292" r="18" fill="#0F172A" stroke="#5EEAD4" stroke-width="2"/>
  <rect x="786" y="332" width="112" height="14" rx="7" fill="#5EEAD4" opacity="0.85"/>
  <rect x="778" y="356" width="128" height="12" rx="6" fill="#94A3B8" opacity="0.45"/>
  <text x="787" y="221" fill="#CCFBF1" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
